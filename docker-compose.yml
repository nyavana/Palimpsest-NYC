# Palimpsest NYC — local development stack
#
# Brings up: postgres (postgis + pgvector + pg_trgm), redis, api, worker, web.
# V1 is online-only — every LLM call terminates at OpenRouter (see .env), so
# no host-gateway escape hatch is required.

services:
  postgres:
    build:
      context: ./docker/postgres
    image: palimpsest/postgres:16-postgis-pgvector
    container_name: palimpsest-postgres
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # V1 single migration surface — postgres entrypoint applies *.sql in lex
      # order on first volume init. Schema changes require `make nuke && make up`.
      - ./apps/api/app/db/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: palimpsest-redis
    command:
      - redis-server
      - --maxmemory
      - 192mb
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - "60"
      - "1"
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: palimpsest/api:dev
    container_name: palimpsest-api
    env_file: .env
    environment:
      HF_HOME: /cache/huggingface
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/api/tests:/app/tests
      - ./logs:/app/logs
      - hf-cache:/cache/huggingface
    ports:
      - "8000:8000"
    command:
      - /opt/venv/bin/uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --reload
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: palimpsest/api:dev
    container_name: palimpsest-worker
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./apps/api/app:/app/app
      - ./apps/worker/worker:/app/worker
      - ./logs:/app/logs
    command:
      - /opt/venv/bin/python
      - -m
      - worker.main
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL}
        VITE_MAP_ENGINE: ${VITE_MAP_ENGINE}
    image: palimpsest/web:dev
    container_name: palimpsest-web
    ports:
      - "5173:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres-data:
    name: palimpsest-postgres-data
  redis-data:
    name: palimpsest-redis-data
  hf-cache:
    name: palimpsest-hf-cache

networks:
  default:
    name: palimpsest-net
